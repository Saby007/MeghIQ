# Application Insights configuration for Spring Boot 3.x
# Connection string will be set as environment variable or referenced in applicationinsights.json
# Application Insights 4.x uses auto-configuration with applicationinsights.json

# Application settings
spring.application.name=aro-monitoring-demo
server.port=8080

# Database configuration for H2 In-Memory (Demo)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# H2 Console (enabled for demo)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Connection pool configuration
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=900000

# Actuator configuration for health checks and metrics
management.endpoints.web.exposure.include=health,metrics,info,env,scheduledtasks,conditions
management.endpoint.health.show-details=always
management.health.db.enabled=true

# Thymeleaf configuration
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.servlet.content-type=text/html

# Quartz scheduler configuration
spring.quartz.job-store-type=memory
spring.quartz.properties.org.quartz.threadPool.threadCount=5

# External API simulation settings
app.external-api.base-url=https://httpbin.org
app.external-api.timeout=5000

# Logging configuration (optimized for production)
logging.level.com.example.monitoring=INFO
logging.level.com.microsoft.applicationinsights=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %level - %msg%n
logging.level.root=INFO