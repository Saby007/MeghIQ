name: Automated PR Review with Azure OpenAI

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [ main, develop ]

permissions:
  contents: read
  pull-requests: write
  issues: read

jobs:
  pr-review:
    runs-on: ubuntu-latest
    name: Automated PR Review
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Fetch PR details
      id: pr-details
      uses: actions/github-script@v7
      with:
        script: |
          const pr = await github.rest.pulls.get({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: context.issue.number
          });
          
          const files = await github.rest.pulls.listFiles({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: context.issue.number
          });
          
          core.setOutput('pr-title', pr.data.title);
          core.setOutput('pr-body', pr.data.body || '');
          core.setOutput('pr-author', pr.data.user.login);
          core.setOutput('files-changed', JSON.stringify(files.data));
          
          return {
            title: pr.data.title,
            body: pr.data.body,
            author: pr.data.user.login,
            filesCount: files.data.length
          };

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        # Check if requirements file exists, otherwise install packages directly
        if [ -f ".github/scripts/requirements.txt" ]; then
          pip install -r .github/scripts/requirements.txt
        else
          echo "Requirements file not found, installing packages directly..."
          pip install openai==1.45.0 azure-identity==1.15.0 azure-core==1.29.5 requests==2.31.0 pydantic==2.5.0 python-dotenv==1.0.0
        fi

    - name: Get changed files content
      id: changed-files
      run: |
        # Get the list of changed files
        git diff --name-only origin/${{ github.base_ref }}..HEAD > changed_files.txt
        
        # Create a file with the diff content (limit to avoid token limits)
        git diff origin/${{ github.base_ref }}..HEAD --unified=3 > pr_diff.txt
        
        # Limit diff size to prevent token overflow (keep first 50KB)
        head -c 50000 pr_diff.txt > pr_diff_limited.txt || cp pr_diff.txt pr_diff_limited.txt
        
        echo "Files changed:"
        cat changed_files.txt

    - name: Generate PR Review with Azure OpenAI
      id: generate-review
      env:
        AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
        AZURE_OPENAI_DEPLOYMENT_NAME: ${{ secrets.AZURE_OPENAI_DEPLOYMENT_NAME }}
        AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
        AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
        PR_TITLE: ${{ steps.pr-details.outputs.pr-title }}
        PR_BODY: ${{ steps.pr-details.outputs.pr-body }}
        PR_AUTHOR: ${{ steps.pr-details.outputs.pr-author }}
        FILES_CHANGED: ${{ steps.pr-details.outputs.files-changed }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        REPO_OWNER: ${{ github.repository_owner }}
        REPO_NAME: ${{ github.event.repository.name }}
        PR_NUMBER: ${{ github.event.number }}
      run: |
        # Check for script in different possible locations
        if [ -f ".github/scripts/pr_reviewer.py" ]; then
          echo "Using script from .github/scripts/"
          python .github/scripts/pr_reviewer.py
        elif [ -f "scripts/pr_reviewer.py" ]; then
          echo "Using script from scripts/"
          python scripts/pr_reviewer.py
        else
          echo "PR reviewer script not found in expected locations"
          echo "Creating basic review..."
          echo "## 🤖 **Automated PR Review**" > review_output.md
          echo "" >> review_output.md
          echo "### ℹ️ **Note**" >> review_output.md
          echo "The PR reviewer script was not found. Please ensure the script is committed to the repository." >> review_output.md
          echo "" >> review_output.md
          echo "**Expected locations:**" >> review_output.md
          echo "- \`.github/scripts/pr_reviewer.py\`" >> review_output.md
          echo "- \`scripts/pr_reviewer.py\`" >> review_output.md
          echo "" >> review_output.md
          echo "**Files in this PR:**" >> review_output.md
          echo '${{ steps.pr-details.outputs.files-changed }}' | head -c 500 >> review_output.md
        fi

    - name: Post Review Comment
      if: steps.generate-review.outputs.review-comment != ''
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          
          // Read the generated review from file
          let reviewContent = '';
          try {
            reviewContent = fs.readFileSync('review_output.md', 'utf8');
          } catch (error) {
            console.log('No review output file found, skipping comment');
            return;
          }
          
          if (!reviewContent.trim()) {
            console.log('Review content is empty, skipping comment');
            return;
          }
          
          // Check if we already have a review comment from this bot
          const comments = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number
          });
          
          const botComment = comments.data.find(comment => 
            comment.user.type === 'Bot' && 
            comment.body.includes('🤖 **Automated PR Review with Azure OpenAI**')
          );
          
          if (botComment) {
            // Update existing comment
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: botComment.id,
              body: reviewContent
            });
            console.log('Updated existing review comment');
          } else {
            // Create new comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: reviewContent
            });
            console.log('Created new review comment');
          }

    - name: Clean up temporary files
      if: always()
      run: |
        rm -f changed_files.txt pr_diff.txt pr_diff_limited.txt review_output.md

  security-scan:
    runs-on: ubuntu-latest
    name: Security and Quality Scan
    if: github.event.pull_request.draft == false
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Run CodeQL Analysis (if applicable)
      uses: github/codeql-action/analyze@v3
      if: contains(github.event.pull_request.changed_files, '.py') || contains(github.event.pull_request.changed_files, '.js') || contains(github.event.pull_request.changed_files, '.ts')
      continue-on-error: true

    - name: Set up Python for security scan
      if: contains(github.event.pull_request.changed_files, '.py')
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install bandit for Python security scan
      if: contains(github.event.pull_request.changed_files, '.py')
      run: pip install bandit[toml]

    - name: Run Python security scan
      if: contains(github.event.pull_request.changed_files, '.py')
      run: |
        bandit -r . -f json -o bandit-report.json || true
        if [ -f bandit-report.json ]; then
          echo "Security scan completed. Check artifacts for results."
        fi
      continue-on-error: true

    - name: Upload security scan results
      if: always() && contains(github.event.pull_request.changed_files, '.py')
      uses: actions/upload-artifact@v4
      with:
        name: security-scan-results
        path: bandit-report.json
        retention-days: 7