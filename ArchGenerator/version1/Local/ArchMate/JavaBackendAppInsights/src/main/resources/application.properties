# Application Insights configuration for Spring Boot 3.x
# Connection string will be set as environment variable or referenced in applicationinsights.json
# Application Insights 4.x uses auto-configuration with applicationinsights.json

# Application settings
spring.application.name=monitoring-demo
server.port=8080

# Actuator configuration for health checks and metrics
management.endpoints.web.exposure.include=health,metrics,info,env
management.endpoint.health.show-details=always

# Logging configuration
logging.level.com.example.monitoring=INFO
logging.level.com.microsoft.applicationinsights=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %level - %msg%n